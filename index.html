<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0c4a6e" />
    <title>BK Débouchage | Débouchage &amp; plomberie d'urgence 24/7</title>
    <meta
      name="description"
      content="BK Débouchage — intervention rapide 24h/24 pour débouchage, plomberie d'urgence et canalisation. Techniciens certifiés en Belgique."
    />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="fr_BE" />
    <meta property="og:site_name" content="BK Débouchage" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Outfit:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <script>
      (function () {
        var stored = localStorage.getItem('bk-theme');
        var prefersDark =
          window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        var isDark = stored === 'dark' || (!stored && prefersDark);
        document.documentElement.classList.add(isDark ? 'dark' : 'light');
        document.documentElement.style.colorScheme = isDark ? 'dark' : 'light';
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
